<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIAC Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <style>
    /* Match the site's navy brand color. Decap CMS only exposes these two
       theme variables for override — deeper restyling of its internal
       components isn't reliably supported and risks breaking on updates. */
    :root {
      --accent: #12263f !important;
      --accent-light: #12263f19 !important;
    }
    body, input, select, textarea, button {
      font-family: "Inter", -apple-system, "Segoe UI", Helvetica, Arial, sans-serif !important;
    }

    /* A full-width ribbon fixed at the very top of the page — sits on top
       of, and above, Decap's own toolbar (not part of it), so it's the
       first thing visible on every screen inside the CMS. The body gets
       matching top padding so Decap's own UI doesn't render underneath it. */
    body { padding-top: 46px; }
    #back-to-site {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #12263f; color: #f7f2e0; text-decoration: none;
      font-weight: 700; font-size: 14px; letter-spacing: .03em;
      padding: 14px 16px; box-shadow: 0 2px 10px rgba(0,0,0,.3);
    }
    #back-to-site:hover { background: #0c1a2e; }
  </style>
</head>
<body>
  <a id="back-to-site" href="https://nyriac.com">&larr; Back to website</a>

  <!-- Decap CMS: gives RIAC staff a login-protected page (via GitHub) to
       upload/manage practice advisory PDFs and Word source files, with
       built-in search and one-click "copy URL" on any uploaded file. -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Shows a "Copy link" button for the PDF/Word doc the moment you open
    // an advisory entry, so you don't have to click into each file field's
    // own sub-page to get its public URL.
    var SITE = 'https://nyriac.com';

    function copyLink(url, event) {
      navigator.clipboard.writeText(url);
      var btn = event.target;
      var original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(function () { btn.textContent = original; }, 1500);
    }

    function linkRow(label, path) {
      if (!path) return null;
      var url = SITE + path;
      return h('div', { style: { marginBottom: '14px' } },
        h('div', { style: { fontWeight: 600, marginBottom: '4px' } }, label),
        h('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } },
          h('input', {
            readOnly: true,
            value: url,
            style: { flex: 1, padding: '6px 8px', fontFamily: 'monospace', fontSize: '13px' },
            onClick: function (e) { e.target.select(); }
          }),
          h('button', {
            onClick: function (e) { copyLink(url, e); },
            style: {
              padding: '6px 14px', background: '#12263f', color: '#f7f2e0',
              border: 'none', borderRadius: '6px', cursor: 'pointer', fontWeight: 600
            }
          }, 'Copy link')
        )
      );
    }

    var AdvisoryPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        return h('div', { style: { padding: '20px', fontFamily: 'Inter, sans-serif' } },
          h('h1', {}, entry.getIn(['data', 'title'])),
          h('p', { style: { color: '#5b6878', marginBottom: '20px' } }, entry.getIn(['data', 'summary'])),
          linkRow('PDF link (public — safe to email)', entry.getIn(['data', 'pdf'])),
          linkRow('Word doc link (internal editing copy only)', entry.getIn(['data', 'docx']))
        );
      }
    });

    CMS.registerPreviewTemplate('advisories', AdvisoryPreview);
  </script>
</body>
</html>
