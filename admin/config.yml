backend:
  name: github
  repo: maildej/nyriac.com
  branch: main
  site_domain: incandescent-nasturtium-490a59.netlify.app

logo:
  src: https://nyriac.com/images/riac-mark.svg
  show_in_header: true
display_url: https://nyriac.com
site_url: https://nyriac.com

media_folder: "advisories"
public_folder: "/advisories"

collections:
  - name: "advisories"
    label: "UNPUBLISHED Advisories"
    folder: "cms/advisories"
    create: true
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary (shown on the public advisories page)", name: "summary", widget: "text" }
      - { label: "PDF (public download)", name: "pdf", widget: "file", media_folder: "/advisories", public_folder: "/advisories" }
      - { label: "Word Doc (internal editing copy — not linked publicly)", name: "docx", widget: "file", media_folder: "/advisories/source", public_folder: "/advisories/source", required: false }
      - { label: "Date Added", name: "date", widget: "datetime", format: "YYYY-MM-DD", default: "" }

  - name: "advisories-published"
    label: "Copies Of Advisories On Website"
    folder: "cms/advisories-published"
    create: true
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary (shown on the public advisories page)", name: "summary", widget: "text" }
      - { label: "PDF (public download)", name: "pdf", widget: "file", media_folder: "/advisories", public_folder: "/advisories" }
      - { label: "Word Doc (internal editing copy — not linked publicly)", name: "docx", widget: "file", media_folder: "/advisories/source", public_folder: "/advisories/source", required: false }
      - { label: "Date Added", name: "date", widget: "datetime", format: "YYYY-MM-DD", default: "" }
